<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Surprise ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>

body{
    margin:0;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e7,#ffc2d1,#ffb3c6);
    font-family:Arial,sans-serif;
}

.container{
    text-align:center;
}

h1{
    color:#ff006e;
    font-size:40px;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    50%{
        transform:scale(1.05);
    }
}

#photo{
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:50%;
    border:5px solid white;
    box-shadow:0 0 25px rgba(255,255,255,.8);
    margin-bottom:20px;
}

button{
    border:none;
    padding:15px 30px;
    font-size:22px;
    border-radius:15px;
    cursor:pointer;
    transition:0.3s;
}

#yesBtn{
    background:#28a745;
    color:white;
}

#noBtn{
    background:#dc3545;
    color:white;
    margin-left:15px;
}

.heart{
    position:absolute;
    color:red;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-120vh);
    }
}

</style>
</head>

<body>

<div class="container">

<!-- Replace photo.jpg with your uploaded photo name -->
<img id="photo" src="photo.jpg">

<h1>🎂 Happy Birthday ❤️ 🎂</h1>

<h2>Do you like my birthday wish? 🥺</h2>

<button id="yesBtn" onclick="celebrate()">
YES 💖
</button>

<button id="noBtn"
onclick="moveNo()"
ontouchstart="moveNo()">
NO 😢
</button>

</div>

<script>

// Floating Hearts
for(let i=0;i<30;i++){

    let h=document.createElement("div");

    h.className="heart";
    h.innerHTML="❤️";

    h.style.left=Math.random()*100+"%";
    h.style.fontSize=(15+Math.random()*30)+"px";
    h.style.animationDuration=(4+Math.random()*6)+"s";

    document.body.appendChild(h);
}

let count=0;

let messages=[
"Are you sure? 🥺",
"Really? 😭",
"Think again ❤️",
"Please? 💖",
"Don't break my heart 😢",
"Last chance 😭",
"You actually want YES 😏"
];

function moveNo(){

    const noBtn=document.getElementById("noBtn");
    const yesBtn=document.getElementById("yesBtn");

    if(count < messages.length){
        noBtn.innerHTML=messages[count];
    }

    count++;

    noBtn.style.position="fixed";

    let maxX=window.innerWidth-noBtn.offsetWidth-20;
    let maxY=window.innerHeight-noBtn.offsetHeight-20;

    noBtn.style.left=Math.random()*maxX+"px";
    noBtn.style.top=Math.random()*maxY+"px";

    yesBtn.style.transform=
    `scale(${1+(count*0.15)})`;
}

function celebrate(){

    var duration=10000;
    var end=Date.now()+duration;

    (function frame(){

        confetti({
            particleCount:8,
            angle:60,
            spread:100,
            origin:{x:0}
        });

        confetti({
            particleCount:8,
            angle:120,
            spread:100,
            origin:{x:1}
        });

        if(Date.now()<end){
            requestAnimationFrame(frame);
        }

    }());

    document.body.innerHTML=`
    <div style="
    text-align:center;
    padding-top:120px;
    color:white;
    width:100%;
    background:linear-gradient(135deg,#ff4d6d,#ff8fab);
    height:100vh;">

    <h1 style="font-size:60px;">
    🎉 HAPPY BIRTHDAY 🎉
    </h1>

    <h2>
    Wishing you endless happiness,
    success and beautiful memories ❤️
    </h2>

    <h1>
    🎂🎁🎈🎊✨💖🎆
    </h1>

    <h2>
    You are amazing 🌟
    </h2>

    </div>
    `;
}

</script>

</body>
</html>
